name: Release AppImage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3-pip \
            cmake \
            pkg-config \
            wget \
            ca-certificates \
            file \
            patchelf \
            libfuse2 \
            fuse \
            imagemagick \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-declarative-dev \
            libvulkan-dev \
            openmpi-bin \
            libopenmpi-dev \
            lldb \
            llvm

      - name: Install Meson and Ninja
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install meson ninja

      - name: Verify package installations
        run: |
          cmake --version
          pkg-config --version
          qmake6 --version
          mpirun --version
          lldb --version
          meson --version
          ninja --version
          convert --version | head -n 2 || true

      - name: Build AppImage
        run: bash scripts/build_appimage.sh

      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GridLock-AppImage
          path: GridLock-*.AppImage
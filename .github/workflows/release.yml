name: Release AppImage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04

    container:
      image: debian:trixie

    env:
      DEBIAN_FRONTEND: noninteractive
      APPIMAGE_EXTRACT_AND_RUN: "1"

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            bash \
            git \
            curl \
            sudo \
            ca-certificates \
            build-essential \
            python3 \
            python3-pip \
            python3-venv \
            cmake \
            meson \
            ninja-build \
            pkg-config \
            wget \
            file \
            patchelf \
            libfuse2t64 \
            fuse3 \
            imagemagick \
            libgl1-mesa-dev \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            qt6-declarative-dev \
            libqt6svg6-dev \
            libqtermwidget-dev \
            openmpi-bin \
            libopenmpi-dev \
            lldb \
            llvm \
            xvfb
          update-ca-certificates
          ldconfig

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Compile Qt-Advanced-Stylesheets
        run: |
          cd external/Qt-Advanced-Stylesheets
          cmake -B build -S . \
            -DQT_VERSION_MAJOR=6 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build -j"$(nproc)"
          cmake --install build
          ldconfig

      - name: Configure and Test
        run: |
          meson setup builddir --prefix=/usr --buildtype=release
          xvfb-run -a meson test -C builddir

      - name: Build AppImage
        run: |
          bash scripts/build_appimage.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: GridLock-*.AppImage
          generate_release_notes: true
          draft: false
          prerelease: false
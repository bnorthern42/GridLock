name: Release AppImage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-pip cmake pkg-config qt6-base-dev qt6-declarative-dev libvulkan-dev openmpi-bin libopenmpi-dev lldb llvm wget fuse

      - name: Install Latest Meson & Ninja
        run: pip3 install meson ninja

      - name: Verify Script Permissions
        run: ls -la scripts/

      - name: Build AppImage
        run: bash scripts/build_appimage.sh

      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GridLock-AppImage
          path: builddir/GridLock-*.AppImage

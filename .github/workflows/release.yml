name: Release AppImage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Add LXQt PPA and install dependencies
        run: |
          # Add the official LXQt PPA for updated Qt6 packages
          sudo add-apt-repository -y ppa:lubuntu-dev/qt6-backports
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3-pip \
            cmake \
            pkg-config \
            wget \
            ca-certificates \
            file \
            patchelf \
            libfuse2 \
            fuse \
            imagemagick \
            libgl1-mesa-dev \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            qt6-declarative-dev \
            libqt6svg6-dev \
            libqtermwidget-qt6-dev \
            openmpi-bin \
            libopenmpi-dev \
            lldb \
            llvm \
            xvfb

      - name: Install Meson and Ninja
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install meson ninja

      - name: Compile Qt-Advanced-Stylesheets
        run: |
          cd external/Qt-Advanced-Stylesheets
          cmake -B build -S . -DQT_VERSION_MAJOR=6 -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build -j$(nproc)
          sudo cmake --install build

      - name: Configure and Test
        run: |
          meson setup builddir --prefix=/usr --buildtype=release
          xvfb-run -a meson test -C builddir

      - name: Build AppImage
        run: bash scripts/build_appimage.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: GridLock-*.AppImage
          generate_release_notes: true
          draft: false
          prerelease: false